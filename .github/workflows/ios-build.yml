name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: find . -maxdepth 3 -type f

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project StreamFlixOTT/StreamFlixOTT.xcodeproj \
            -scheme StreamFlixOTT \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
