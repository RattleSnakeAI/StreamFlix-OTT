name: Build iOS Simulator App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project StreamFlixOTT/StreamFlixOTT.xcodeproj \
            -scheme StreamFlixOTT \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "StreamFlixOTT.app" | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" StreamFlixOTT-simulator.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamFlixOTT-simulator
          path: StreamFlixOTT-simulator.zip
